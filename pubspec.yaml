name: council
description: Christian Theology AI Research App - Offline-first theological content with AI-powered Q&A
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Database
  sqflite: ^2.3.0
  # The app queries an FTS5 table shipped inside the corpus. sqflite alone opens
  # the *platform* SQLite, and Android's build ships without the FTS5 module, so
  # every hybrid search threw `no such module: fts5` on Android while working on
  # Apple's FTS5-enabled system SQLite. Routing openDatabase through the FFI
  # factory backed by sqlite3_flutter_libs bundles one modern, FTS5-enabled
  # SQLite on every platform, removing that platform drift.
  sqflite_common_ffi: ^2.3.3
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.8.3
  
  # HTTP (for Ollama)
  http: ^1.1.0
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_markdown: ^0.6.18
  
  # Utils
  shared_preferences: ^2.2.2
  uuid: ^4.2.1

  # Secure storage for user-supplied API keys (Keychain / Keystore)
  flutter_secure_storage: ^9.2.2

  # Runs the bundled embedding model so a query can be encoded on-device.
  # Supports android, ios, linux, macos and windows — every platform targeted
  # since web was dropped.
  onnxruntime: ^1.4.1

  # Verifies the checksum of a downloaded content pack before installing it.
  crypto: ^3.0.7
  # Packs are stored outside the sqflite databases directory, which is not a
  # documented place to keep arbitrary files.
  path_provider: ^2.1.6
  liquid_glass_widgets: ^0.22.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  # Generates the app icon for every platform from one master, replacing the
  # default Flutter logo. Dev-only: the generated icons are committed, so the
  # tool isn't needed at build time.
  flutter_launcher_icons: ^0.14.1

# App icon: an open book (scripture and the writings) under a cross, on the
# app's indigo. Regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: "assets/icon/icon.png"
  android: "ic_launcher"
  adaptive_icon_background: "#3B2E6B"
  adaptive_icon_foreground: "assets/icon/adaptive_foreground.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/theology.db.gz
    - assets/metadata.json
    - assets/pack_catalogue.json
    - assets/model/vocab.txt
    - assets/model/model_quantized.onnx
    - assets/icon/icon.png